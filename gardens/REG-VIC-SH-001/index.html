<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ecological Registry - Arundel</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        serif: ['"Abril Fatface"', 'serif'],
        sans: ['"IBM Plex Sans"', 'sans-serif']
      },
      colors: {
        rg:'#3d4535',
        rb:'#fff0dc',
        rl:'#d7ccb9',
        rdp:'#485141'
      }
    }
  }
}
</script>

<style>
* { border-radius:0!important; }

/* CLEAR MARKER */
.marker:before{
content:"UPDATED LAYOUT V4";
position:absolute;
top:12px;
right:12px;
font-size:.65rem;
border:1px solid rgba(255,240,220,.4);
padding:.3rem .6rem;
background:rgba(255,240,220,.15);
}

/* Sticky */
.sticky-panel{
position:sticky;
top:100px;
}

/* Metric boxes */
.metric{
border:1px solid rgba(255,240,220,.3);
padding:1rem;
background:rgba(255,240,220,.08);
}

/* Badge chip */
.badge{
border:1px solid rgba(255,240,220,.3);
padding:.25rem .6rem;
font-size:.7rem;
}
</style>
</head>

<body class="bg-rb text-rg dark:bg-rg dark:text-rb font-sans">

<header class="sticky top-0 bg-rb dark:bg-rg border-b border-rl p-4 flex justify-between">
  <div class="flex gap-3 items-center">
    <div class="w-8 h-8 bg-rg text-rb grid place-items-center">ER</div>
    <div>
      <div class="text-sm">Ecological Registry</div>
      <div id="headerMeta" class="text-xs opacity-60">Loading...</div>
    </div>
  </div>

  <div class="text-xs border px-2 py-1">UPLOAD TEST MARKER</div>
</header>

<main class="max-w-6xl mx-auto p-6">

<div class="grid lg:grid-cols-12 gap-6">

<!-- LEFT -->
<div class="lg:col-span-8 border p-8">

<div id="heroType" class="text-xs opacity-50 mb-3"></div>

<h1 id="heroName" class="text-6xl font-serif mb-4"></h1>

<div id="heroTags" class="flex gap-2 mb-4"></div>

<p id="heroDesc" class="opacity-80 mb-6"></p>

<div class="grid grid-cols-2 gap-4 text-sm">
<div>
<div class="text-xs opacity-50">Stewards</div>
<div id="heroStewards"></div>
</div>

<div>
<div class="text-xs opacity-50">Registry ID</div>
<div id="heroId"></div>
</div>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="lg:col-span-4">
<div class="sticky-panel">

<div class="marker relative bg-rg text-rb p-8 flex flex-col gap-6">

<div class="grid grid-cols-2 gap-3">

<div class="metric">
<div class="text-xs opacity-50">Score</div>
<div id="heroScore" class="text-7xl font-serif"></div>
</div>

<div class="metric">
<div class="text-xs opacity-50">Badges</div>
<div id="heroBadgeCount" class="text-7xl font-serif"></div>
</div>

</div>

<div>
<div id="heroLevel" class="badge mb-3"></div>

<div class="h-2 bg-white/20">
<div id="heroScoreBar" class="h-full bg-white" style="width:0%"></div>
</div>

<div class="flex justify-between text-xs mt-2 opacity-70">
<span>Baseline <span id="heroBaseline"></span></span>
<span>Target 82</span>
</div>
</div>

<div>
<div class="text-xs mb-2 opacity-70">Badges earned</div>
<div id="heroBadges" class="flex flex-wrap gap-2"></div>
</div>

</div>

</div>
</div>

</div>

</main>

<script>
const DATA = {
garden_name:"Arundel",
garden_type:"Ecological Forest Garden",
suburb:"Surrey Hills",
state:"VIC",
stewards:"Andrew & Elizabeth",
garden_id:"ER-VIC-SH-ARU-0001",
description:"A registered ecological garden.",
score:73,
baseline:58,
badges:["Habitat Builder","Corridor Node","G&S Verified"]
}

function render(){
document.getElementById("headerMeta").innerText = DATA.garden_name

document.getElementById("heroType").innerText = DATA.garden_type
document.getElementById("heroName").innerText = DATA.garden_name
document.getElementById("heroDesc").innerText = DATA.description
document.getElementById("heroStewards").innerText = DATA.stewards
document.getElementById("heroId").innerText = DATA.garden_id

document.getElementById("heroScore").innerText = DATA.score
document.getElementById("heroBaseline").innerText = DATA.baseline
document.getElementById("heroScoreBar").style.width = DATA.score+"%"

document.getElementById("heroBadgeCount").innerText = DATA.badges.length

let badgeHTML=""
DATA.badges.forEach(b=>{
badgeHTML+=`<span class="badge">${b}</span>`
})
document.getElementById("heroBadges").innerHTML = badgeHTML

document.getElementById("heroLevel").innerText = "Registered Ecological Garden"
}

render()
</script>

</body>
</html>
